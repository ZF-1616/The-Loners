<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>About Us</title>

  <style>
    body {
      margin: 0;
      background: #111;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: white;
    }

    .scene {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      perspective: 1200px;
    }

    .carousel {
      position: relative;
      width: 300px;
      height: 300px;
      transform-style: preserve-3d;
      animation: rotate 15s linear infinite;
    }

    .carousel:hover {
      animation-play-state: paused;
    }

    .card {
      position: absolute;
      width: 180px;
      height: 220px;
      background: #1f1f1f;
      border-radius: 20px;
      text-align: center;
      padding: 20px;
      box-shadow: 0 0 20px rgba(255,255,255,0.15);
      transition: 0.3s;
      cursor: pointer;
    }

    .card:hover {
      transform: scale(1.1);
      background: #2c2c2c;
    }

    .card h1 {
      font-size: 22px;
      margin-top: 40px;
    }

    .description {
      margin-top: 20px;
      font-size: 14px;
      color: #bbb;
    }

    .card:nth-child(1) {
      transform: rotateY(0deg) translateZ(350px);
    }

    .card:nth-child(2) {
      transform: rotateY(90deg) translateZ(350px);
    }

    .card:nth-child(3) {
      transform: rotateY(180deg) translateZ(350px);
    }

    .card:nth-child(4) {
      transform: rotateY(270deg) translateZ(350px);
    }

    @keyframes rotate {
      from {
        transform: rotateY(0deg);
      }
      to {
        transform: rotateY(360deg);
      }
    }

    .sidebar {
      position: fixed;
      right: -320px;
      top: 0;
      width: 300px;
      height: 100%;
      background: #1b1b1b;
      padding: 30px;
      transition: 0.4s;
      box-shadow: -5px 0 20px rgba(0,0,0,0.5);
    }

    .card:hover ~ .sidebar {
      right: 0;
    }

    .home-btn {
      position: fixed;
      bottom: 20px;
      left: 20px;
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      background: white;
      cursor: pointer;
      font-size: 16px;
    }

  </style>
</head>

<body>

<div class="scene">

  <div class="carousel">

    <div class="card">
      <h1>JUSTTESTING</h1>
      <div class="description">
        Owner and developer of this website
      </div>
    </div>

    <div class="card">
      <h1>BROISSUS</h1>
      <div class="description">
        Co-owner of this website
      </div>
    </div>

    <div class="card">
      <h1>ETHAN</h1>
      <div class="description">
        Gives many ideas
      </div>
    </div>

    <div class="card">
      <h1>Niranthakk</h1>
      <div class="description">
        Helper and developer
      </div>
    </div>

    <div class="sidebar">
      <h1>Member Info</h1>
      <p>
        Hover any member card to pause the rotation 
      </p>
    </div>

  </div>

</div>

<button class="home-btn" onclick="goToPage()">
  Home
</button>

<script>
  function goToPage() {
    window.location.href = "/The-Loners";
  }
</script>

</body>
</html>
