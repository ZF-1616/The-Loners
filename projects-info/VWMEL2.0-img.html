<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Meet The Loners team.">
    <title>Vote Who Ming En Love Gallery | The Loners</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <a class="brand" href="../index.html"><span class="brand-mark">TL</span><span>The Loners</span></a>
        <nav class="nav-links" aria-label="Main navigation">
            <a href="../index.html">Home</a>
            <a href="../projects.html">Projects</a>
            <a href="../introduce.html">Team</a>
            <a href="https://discord.gg/5587x2Tt52" target="_blank" rel="noopener">Discord</a>
        </nav>
    </header>

    <main>
        <section class="page-hero">
            <p class="eyebrow">Made by The Loners</p>
            <h1>Vote Who Ming En Love Gallery</h1>
            <p>Check out our project growing history.</p>
        </section>

        <section class="content">
            <div class="section-heading">
                <h2>Our project's history image</h2>
                <p>From the version 1.0 to now </p>
                <div class="gallery-photos">
                    <img src="VWMEL-1.png" alt="screene-1 mobile" class="gallery-thumb" data-full="VWMEL-1.png">
                    <img src="VWMEL-2.png" alt="screene-2 pc/desktop" class="gallery-thumb" data-full="VWMEL-2.png">
                </div>
            </div>

            <div id="image-lightbox" class="lightbox" aria-hidden="true">
                <button class="lightbox-close" type="button" aria-label="Close preview">×</button>
                <img id="lightbox-image" src="" alt="Full preview">
            </div>
            </div>

            <div class="grid">

            </div>
        </section>
    </main>

    <footer class="site-footer"><strong>The Loners</strong><span>Together, we build.</span></footer>

    <script>
        const thumbs = document.querySelectorAll('.gallery-thumb');
        const lightbox = document.getElementById('image-lightbox');
        const lightboxImage = document.getElementById('lightbox-image');
        const closeButton = document.querySelector('.lightbox-close');

        thumbs.forEach((thumb) => {
            thumb.addEventListener('click', () => {
                lightboxImage.src = thumb.dataset.full;
                lightboxImage.alt = thumb.alt;
                lightbox.classList.add('is-open');
                lightbox.setAttribute('aria-hidden', 'false');
                document.body.style.overflow = 'hidden';
            });
        });

        const closeLightbox = () => {
            lightbox.classList.remove('is-open');
            lightbox.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = '';
        };

        closeButton.addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', (event) => {
            if (event.target === lightbox) {
                closeLightbox();
            }
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' && lightbox.classList.contains('is-open')) {
                closeLightbox();
            }
        });
    </script>
</body>
</html>
